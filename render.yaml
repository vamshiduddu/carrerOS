services:
  - type: web
    name: careeros-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && cd apps/api && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: careeros-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app  # update this after deploying web
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: CareerOS <noreply@careeros.app>
      - key: NEXT_PUBLIC_APP_URL
        value: https://your-frontend.vercel.app  # update this after deploying web
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: careeros-db
    databaseName: careeros
    plan: free
    region: oregon
